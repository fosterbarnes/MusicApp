.screenshot-stack {
  position: relative;
  width: min(850px, 92vw);
  max-width: 100%;

  --ss-dur: 0.85s;
  --ss-cycle-dur: 0.85s;
  --ss-ease: cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes ssCycleFrontToBack {
  0% { transform: translate(calc(-50% + 14% - 44px), 12%); opacity: 1; z-index: 5; }
  34% { opacity: 0; }
  42% { transform: translate(calc(-50% + 25%), 26%); opacity: 0; z-index: 5; }
  43% { transform: translate(calc(-50% - 19%), -24%); opacity: 0; z-index: 1; }
  100% { transform: translate(calc(-50% - 7%), -12%); opacity: 1; z-index: 1; }
}
.screenshot-stack__inner {
  position: relative;
  min-height: clamp(220px, 58vw, 440px);
  touch-action: manipulation;
  padding-top: clamp(2rem, 10vw, 4.5rem);
  box-sizing: border-box;
}
.screenshot-stack .screenshot-stack__layer,
#paige-page-content .screenshot-stack img.screenshot-stack__layer {
  position: absolute;
  left: 50%;
  top: 0;
  width: 88%;
  max-width: 88% !important;
  height: auto;
  margin: 0 !important;
  display: block;
  border-radius: 6px;
  transform-origin: center center;
  opacity: 1;
  will-change: transform, opacity;
}
.screenshot-stack .screenshot-stack__layer[data-depth],
#paige-page-content .screenshot-stack img.screenshot-stack__layer[data-depth] {
  transition: transform var(--ss-dur) var(--ss-ease), opacity var(--ss-dur) var(--ss-ease);
}
.screenshot-stack__layer[data-depth="back"] {
  transform: translate(calc(-50% - 7%), -12%);
  z-index: 1;
}
.screenshot-stack__layer[data-depth="middle"] {
  transform: translate(-50%, 0%);
  z-index: 2;
}
.screenshot-stack__layer[data-depth="front"] {
  transform: translate(calc(-50% + 14% - 44px), 12%);
  z-index: 3;
}
.screenshot-stack__layer.is-exiting {
  transition: none !important;
  animation: ssCycleFrontToBack var(--ss-cycle-dur) var(--ss-ease) forwards;
}
.screenshot-stack--motion-off .screenshot-stack__layer {
  transition: none !important;
  animation: none !important;
}
