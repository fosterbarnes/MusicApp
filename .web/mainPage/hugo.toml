baseURL = 'https://musicapp.info/'
locale = 'en-us'
title = 'musicApp'

# Bump paths when tagging a new release (tag + release codename in filenames).
[params.downloads]
x64 = 'https://github.com/fosterbarnes/musicApp/releases/download/v0.2.6/musicApp-v0.2.6-nuggetsEverdark-x64-installer.exe'
x86 = 'https://github.com/fosterbarnes/musicApp/releases/download/v0.2.6/musicApp-v0.2.6-nuggetsEverdark-x86-installer.exe'
arm64 = 'https://github.com/fosterbarnes/musicApp/releases/download/v0.2.6/musicApp-v0.2.6-nuggetsEverdark-arm64-installer.exe'
portable = 'https://github.com/fosterbarnes/musicApp/releases/download/v0.2.6/musicApp-v0.2.6-nuggetsEverdark-portable.zip'

[markup.highlight]
noclasses = false
style = "github"

[[module.imports]]
path = "github.com/willfaught/paige"

# Site CSS via Paige ([paige] front matter on a page overrides this block).
# Header icon: static/icon/musicApp Icon.png (#paige-site-title::before).
[params.paige]
style = """
:root { --bs-body-font-family: "Segoe UI", "Segoe UI Variable", system-ui, -apple-system, sans-serif; }
#paige-site-title {
  font-size: 2.3rem !important;
  line-height: 1.2 !important;
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: center;
  gap: 0.65rem;
}
#paige-site-header {
  text-align: center;
}
#paige-site-title::before {
  content: "";
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  transform: translateY(4px);
  background: center / contain no-repeat url("/icon/musicApp%20Icon.png");
  image-rendering: crisp-edges;
  image-rendering: pixelated;
}
#paige-page-content .paige-shortcode-icon { display: block; text-align: center; }
#paige-page-content img:not(.home-download-btn-img) { display: block; max-width: 80%; height: auto; margin-inline: auto; }
#paige-page-content .home-main-flow {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  align-self: stretch;
  width: 100%;
  gap: clamp(1rem, 3vw, 2rem);
  margin-block-end: 1.5rem;
}
#paige-page-content .home-downloads-block {
  align-self: center;
  width: min(100%, 70rem);
  margin-inline: auto;
  text-align: center;
  margin-block-start: 0.25rem;
  margin-block-end: 0;
}
#paige-page-content .home-downloads-block p { margin-bottom: 0.35rem; }
#paige-page-content .home-downloads-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem 0.9rem;
  justify-content: center;
  align-items: center;
  margin-bottom: 1rem !important;
}
#paige-page-content .home-download-btn {
  display: inline-block;
  line-height: 0;
}
#paige-page-content .home-download-btn:focus-visible {
  outline: 2px solid var(--bs-link-color);
  outline-offset: 3px;
  border-radius: 4px;
}
#paige-page-content .home-download-btn-img {
  display: block;
  width: auto;
  max-width: min(100%, 17.5rem);
  height: clamp(40px, 11vw, 52px);
  margin-inline: 0;
}
#paige-page-content .home-downloads-changelog {
  margin-bottom: 0 !important;
  overflow-wrap: anywhere;
}
#paige-page-content .screenshot-stack-host {
  width: 100%;
  margin-block-start: clamp(18px, 4vw, 32px);
  margin-block-end: 0;
  flex-shrink: 0;
}
.screenshot-stack {
  position: relative;
  width: min(850px, 92vw);
  max-width: 100%;
  margin-inline: auto;
  --ss-dur: 0.85s;
  --ss-cycle-dur: 0.85s;
  --ss-ease: cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes ssCycleFrontToBack {
  0% { transform: translate(calc(-50% + 14% - 44px), 12%); opacity: 1; z-index: 5; }
  34% { opacity: 0; }
  42% { transform: translate(calc(-50% + 25%), 26%); opacity: 0; z-index: 5; }
  43% { transform: translate(calc(-50% - 19%), -24%); opacity: 0; z-index: 1; }
  100% { transform: translate(calc(-50% - 7%), -12%); opacity: 1; z-index: 1; }
}
.screenshot-stack__inner {
  position: relative;
  min-height: clamp(220px, 58vw, 440px);
  touch-action: manipulation;
  padding-top: clamp(2rem, 10vw, 4.5rem);
  box-sizing: border-box;
}
.screenshot-stack .screenshot-stack__layer,
#paige-page-content .screenshot-stack img.screenshot-stack__layer {
  position: absolute;
  left: 50%;
  top: 0;
  width: 88%;
  max-width: 88% !important;
  height: auto;
  margin: 0 !important;
  display: block;
  border-radius: 6px;
  transform-origin: center center;
  opacity: 1;
  will-change: transform, opacity;
}
.screenshot-stack .screenshot-stack__layer[data-depth],
#paige-page-content .screenshot-stack img.screenshot-stack__layer[data-depth] {
  transition: transform var(--ss-dur) var(--ss-ease), opacity var(--ss-dur) var(--ss-ease);
}
.screenshot-stack__layer[data-depth="back"] {
  transform: translate(calc(-50% - 7%), -12%);
  z-index: 1;
}
.screenshot-stack__layer[data-depth="middle"] {
  transform: translate(-50%, 0%);
  z-index: 2;
}
.screenshot-stack__layer[data-depth="front"] {
  transform: translate(calc(-50% + 14% - 44px), 12%);
  z-index: 3;
}
.screenshot-stack__layer.is-exiting {
  transition: none !important;
  animation: ssCycleFrontToBack var(--ss-cycle-dur) var(--ss-ease) forwards;
}
.screenshot-stack--motion-off .screenshot-stack__layer {
  transition: none !important;
  animation: none !important;
}
"""

[params.paige.site]
description = "Lightweight music player for Windows. Free and open source."
disable_credit = true
external_link_new_tab = true
disable_menu = true

[params.paige.pages]
disable_authors = true
disable_date = true
disable_keywords = true
disable_next = false
disable_prev = false
disable_reading_time = true
disable_series = true
disable_toc = true
disable_word_count = true

[params.paige.subpages]
disable_authors = true
disable_date = true
disable_keywords = true
disable_reading_time = true
disable_series = true
disable_summary = true
disable_word_count = true
